# TitanShare Daemon Configuration
# Edit this file and restart the daemon to apply changes.

[daemon]
# TCP port for Android connections
port = 9999

# UDP port for screen mirroring
mirror_port = 5001

# Directory for received files
received_dir = /var/lib/titanshare/received_files

# QR code refresh interval (seconds)
qr_refresh = 5

# Log level: debug, info, warn, error
log_level = info
